spring:
  application:
    name: hrms-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hrms}
    username: ${SPRING_DATASOURCE_USERNAME:hrms}
    password: ${SPRING_DATASOURCE_PASSWORD:hrms}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: hrms-pool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      # Legacy import accepts the DBF snapshot (optionally zipped) via upload.
      max-file-size: ${HRMS_UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${HRMS_UPLOAD_MAX_REQUEST_SIZE:100MB}
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: 8080
  servlet:
    context-path: /

# Application-level configuration (configuration-first principle).
# These are sensible defaults; all are overridable without code changes.
hrms:
  defaults:
    base-currency: AED
    base-country: AE
    proration-basis: CALENDAR_30
    rounding-method: HALF_UP
    rounding-scale: 2
  tenant:
    header: X-Company-Id
  security:
    jwt:
      # HS256 signing secret. MUST be >= 32 chars; override in production via env.
      secret: ${HRMS_JWT_SECRET:change-me-please-use-a-long-random-secret-key-32b+}
      # Access-token lifetime in minutes.
      expiration-minutes: ${HRMS_JWT_EXPIRATION_MINUTES:480}
      issuer: hrms
  notifications:
    bulk-job-email-to: ${HRMS_BULK_JOB_EMAIL_TO:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.hrms: INFO
    org.flywaydb: INFO
